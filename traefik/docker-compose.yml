services:

  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"       # HTTP → wird zu HTTPS weitergeleitet
      - "443:443"     # HTTPS
      - "443:443/udp" # HTTP/3 (QUIC)
    environment:
      TZ: Europe/Berlin
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro   # Docker-Events lesen
      - traefik-certs:/certs                            # Let's Encrypt Zertifikate
      - traefik-config:/config                          # Dynamische Konfiguration
    command:
      # API & Dashboard
      - --api.dashboard=true
      - --api.insecure=false

      # Docker Provider
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false       # Nur explizit aktivierte Container
      - --providers.docker.network=traefik-proxy

      # Entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http3=true

      # Let's Encrypt (ACME)
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/certs/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web

      # Logging
      - --log.level=INFO
      - --accesslog=true

    labels:
      - "traefik.enable=true"

      # Dashboard Router
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.home.pfeiffer-privat.de`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-auth"

      # Basic Auth für Dashboard (admin / Passwort aus .env)
      # Passwort-Hash generieren: htpasswd -nb admin PASSWORT
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"

      # Globale Middlewares
      - "traefik.http.middlewares.secure-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.secure-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.secure-headers.headers.forceSTSHeader=true"

    networks:
      - traefik-proxy

  # PHP-Webseite
  php:
    image: php:8.3-fpm-alpine
    container_name: traefik-php
    restart: unless-stopped
    environment:
      TZ: Europe/Berlin
    volumes:
      - traefik-site:/srv/infra
    networks:
      - traefik-proxy

  # Nginx als Webserver für PHP-Seite
  infra-web:
    image: nginx:alpine
    container_name: infra-web
    restart: unless-stopped
    environment:
      TZ: Europe/Berlin
    volumes:
      - traefik-site:/usr/share/nginx/html:ro
    networks:
      - traefik-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.infra.rule=Host(`infra.home.pfeiffer-privat.de`)"
      - "traefik.http.routers.infra.entrypoints=websecure"
      - "traefik.http.routers.infra.tls.certresolver=letsencrypt"
      - "traefik.http.services.infra.loadbalancer.server.port=80"

  # Init-Container: legt PHP-Seite ins Volume
  site-init:
    image: alpine:latest
    container_name: site-init
    restart: "no"
    volumes:
      - traefik-site:/site
    command: >
      sh -c "
        if [ ! -f /site/index.php ]; then
          echo '==> Erstelle index.php...' &&
          cat > /site/index.php << 'EOF'
      <?php
      echo '<html><head><meta charset=UTF-8><title>pfeiffer-privat.de</title>';
      echo '<style>body{font-family:sans-serif;background:#0f172a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}';
      echo '.card{background:#1e293b;border:1px solid #334155;border-radius:1rem;padding:2.5rem;max-width:500px;width:100%}';
      echo 'h1{color:#f1f5f9;margin-bottom:1rem}';
      echo '.row{display:flex;justify-content:space-between;padding:.5rem 1rem;background:#0f172a;border-radius:.5rem;margin:.5rem 0}';
      echo '.label{color:#64748b}.value{color:#38bdf8;font-family:monospace}</style></head><body>';
      echo '<div class=card><h1>pfeiffer-privat.de</h1>';
      echo '<div class=row><span class=label>PHP</span><span class=value>'.phpversion().'</span></div>';
      echo '<div class=row><span class=label>Host</span><span class=value>'.gethostname().'</span></div>';
      echo '<div class=row><span class=label>Zeit</span><span class=value>'.date('d.m.Y H:i:s').'</span></div>';
      echo '</div></body></html>';
      EOF
          echo '==> Fertig.'
        else
          echo '==> index.php bereits vorhanden.'
        fi
      "

volumes:
  traefik-certs:
  traefik-config:
  traefik-site:

networks:
  traefik-proxy:
    name: traefik-proxy
    driver: bridge
