services:

  postgres:
    image: postgres:16-alpine
    container_name: matrix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: synapse
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      TZ: Europe/Berlin
    volumes:
      - matrix-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse -d synapse"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: matrix-synapse
    restart: unless-stopped
    environment:
      SYNAPSE_SERVER_NAME: ${MATRIX_DOMAIN}
      SYNAPSE_REPORT_STATS: "no"
      TZ: Europe/Berlin
    volumes:
      - matrix-synapse-data:/data
    ports:
      - "8008:8008"   # HTTP – TLS-Terminierung via NGinx Proxy Manager
    depends_on:
      postgres:
        condition: service_healthy
    # Beim ersten Start Konfiguration generieren (einmalig, außerhalb Portainer):
    # docker run --rm -e SYNAPSE_SERVER_NAME=matrix.home.pfeiffer-privat.de \
    #   -e SYNAPSE_REPORT_STATS=no \
    #   -v matrix-synapse-data:/data matrixdotorg/synapse:latest generate

  element:
    image: vectorim/element-web:latest
    container_name: matrix-element
    restart: unless-stopped
    volumes:
      - matrix-element-config:/app/config:ro
    ports:
      - "8009:80"     # HTTP – TLS-Terminierung via NGinx Proxy Manager

  synapse-admin:
    image: awesometechnologies/synapse-admin:latest
    container_name: matrix-synapse-admin
    restart: unless-stopped
    environment:
      # Basis-URL des Synapse-Servers (aus Browser-Sicht)
      REACT_APP_SERVER: https://${MATRIX_DOMAIN}
    ports:
      - "8010:80"     # HTTP – TLS-Terminierung via NGinx Proxy Manager
    depends_on:
      - synapse

volumes:
  matrix-postgres-data:
  matrix-synapse-data:
  matrix-element-config:
