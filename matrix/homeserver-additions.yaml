# Ergänzungen für homeserver.yaml nach dem ersten "generate"
# Diese Einstellungen in die generierte homeserver.yaml einfügen/überschreiben

# -------------------------------------------------------
# Registrierung: Invitation-only per Registration Token
# -------------------------------------------------------
enable_registration: true
registration_requires_token: true
allow_guest_access: false

# -------------------------------------------------------
# Datenbank: PostgreSQL statt SQLite
# -------------------------------------------------------
database:
  name: psycopg2
  args:
    user: synapse
    password: DEIN_POSTGRES_PASSWORD   # gleich wie POSTGRES_PASSWORD in Portainer
    database: synapse
    host: postgres
    cp_min: 5
    cp_max: 10

# -------------------------------------------------------
# Federation deaktivieren (rein privater Server)
# -------------------------------------------------------
federation_domain_whitelist: []

# -------------------------------------------------------
# Rate Limiting (optional lockern für kleine Nutzerzahl)
# -------------------------------------------------------
rc_login:
  address:
    per_second: 0.1
    burst_count: 3
  account:
    per_second: 0.1
    burst_count: 3
